name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      build: ${{ steps.v.outputs.build }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "version=1.0.$COUNT" >> $GITHUB_OUTPUT
          echo "build=$COUNT" >> $GITHUB_OUTPUT
          echo "tag=v1.0.$COUNT" >> $GITHUB_OUTPUT

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter test

  build-apk:
    name: Build APK
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: >
          flutter build apk --debug
          --build-name=${{ needs.version.outputs.version }}
          --build-number=${{ needs.version.outputs.build }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-windows:
    name: Build Windows (MSIX)
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - name: Configure Windows
        run: flutter build windows --config-only --release
      - name: Patch CMakeLists
        run: |
          Get-ChildItem -Path "build\windows" -Filter "CMakeLists.txt" -Recurse | ForEach-Object {
            (Get-Content $_.FullName) -replace 'cmake_minimum_required\(VERSION [0-2]\.[0-9]+\)', 'cmake_minimum_required(VERSION 3.5)' | Set-Content $_.FullName
          }
      - name: Build Windows
        run: flutter build windows --release
      - name: Build MSIX
        run: >
          flutter pub run msix:create
          --build-windows=false
          --display-name="Law Office"
          --publisher-display-name="Mohamed Alksas"
          --publisher="CN=MohamedAlksas"
          --install-certificate=false
          --version=${{ needs.version.outputs.version }}.0
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-msix
          path: build/windows/x64/runner/Release/*.msix

  release:
    name: Create Release & Deploy
    needs: [version, build-apk, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "notes=Initial release" >> $GITHUB_OUTPUT
          else
            LOG=$(git log $PREV_TAG..HEAD --oneline --no-decorate 2>/dev/null || echo "Initial release")
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload Release Assets
        run: |
          gh release upload ${{ needs.version.outputs.tag }} \
            app-debug-apk/app-debug.apk \
            app-release-msix/*.msix \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update backend version.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "No GH_TOKEN, skipping version update"
            exit 0
          fi
          VERSION="${{ needs.version.outputs.version }}"
          BUILD="${{ needs.version.outputs.build }}"
          TAG="${{ needs.version.outputs.tag }}"
          REPO="MohamedAlksas/lawyer-app-flutter"
          APK_URL="https://github.com/$REPO/releases/download/$TAG/app-debug.apk"
          MSIX_FILE=$(ls app-release-msix/*.msix | head -n 1 | xargs basename)
          WIN_URL="https://github.com/$REPO/releases/download/$TAG/$MSIX_FILE"

          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/MohamedAlksas/lawyer-app-backend/contents/version.json" | jq -r '.sha')

          PAYLOAD=$(cat <<ENDJSON
          {
            "version": "$VERSION",
            "buildNumber": $BUILD,
            "downloadUrl": "$APK_URL",
            "downloadUrlWindows": "$WIN_URL",
            "releaseNotes": "Auto-build $VERSION"
          }
          ENDJSON
          )
          CONTENT=$(echo "$PAYLOAD" | base64 -w0)

          curl -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"chore: auto-update version to $VERSION\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
            "https://api.github.com/repos/MohamedAlksas/lawyer-app-backend/contents/version.json"

      - name: Trigger Render Deploy
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_KEY" ]; then
            echo "No RENDER_KEY, skipping Render deploy"
            exit 0
          fi
          curl -X POST "https://api.render.com/v1/services/srv-d8d339ojs32c73f4qjd0/deploys" \
            -H "Authorization: Bearer $RENDER_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
